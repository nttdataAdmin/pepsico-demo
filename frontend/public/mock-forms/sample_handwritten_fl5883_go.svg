  <text x="440" y="206" class="t cell">GO</text>
  <text x="540" y="206" class="t cell">NO-GO</text>
  <text x="640" y="206" class="t cell">N/A � YES � NO</text>
  <text x="28" y="236" class="t cell">First 5 bags  mixed product review</text>
  <text x="28" y="264" class="t cell">PSM completed?</text>
  <text x="28" y="292" class="t cell">Blocker / sock in place?</text>
