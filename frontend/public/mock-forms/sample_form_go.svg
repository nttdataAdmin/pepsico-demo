<svg xmlns="http://www.w3.org/2000/svg" width="720" height="900" viewBox="0 0 720 900">
  <rect width="720" height="900" fill="#fafafa"/>
  <rect x="24" y="24" width="672" height="72" fill="#003087"/>
  <text x="360" y="58" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="14" font-weight="bold">JOB AID — PACKAGE QUALITY &amp; REGULATORY (DEMO)</text>
  <text x="360" y="78" text-anchor="middle" fill="#cce0ff" font-family="Arial,sans-serif" font-size="10">FL-5883 style mock · all checks GO</text>
  <rect x="24" y="110" width="672" height="56" fill="#fff" stroke="#ccc"/>
  <text x="40" y="140" font-family="Arial,sans-serif" font-size="11" fill="#333">DATE __/__/__   SHIFT ____   PRODUCT ________________</text>
  <text x="40" y="200" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#003087">Checklist (demo ticks in GO column)</text>
  <!-- header row -->
  <rect x="32" y="220" width="656" height="28" fill="#e8eef6"/>
  <text x="48" y="238" font-family="Arial,sans-serif" font-size="10" fill="#333">Check</text>
  <text x="420" y="238" font-family="Arial,sans-serif" font-size="10" fill="#333">GO</text>
  <text x="520" y="238" font-family="Arial,sans-serif" font-size="10" fill="#333">NO-GO</text>
  <!-- rows -->
  <g font-family="Arial,sans-serif" font-size="10" fill="#222">
    <text x="48" y="268">First 5 bags reviewed</text>
    <text x="420" y="268" fill="#0a7a3e" font-weight="bold">✓</text>
    <text x="48" y="298">PSM completed</text>
    <text x="420" y="298" fill="#0a7a3e" font-weight="bold">✓</text>
    <text x="48" y="328">Expiration / price coding</text>
    <text x="420" y="328" fill="#0a7a3e" font-weight="bold">✓</text>
    <text x="48" y="358">Julian / plant / shift code</text>
    <text x="420" y="358" fill="#0a7a3e" font-weight="bold">✓</text>
    <text x="48" y="388">Material odor</text>
    <text x="420" y="388" fill="#0a7a3e" font-weight="bold">✓</text>
    <text x="48" y="418">Product taste / correct product</text>
    <text x="420" y="418" fill="#0a7a3e" font-weight="bold">✓</text>
    <text x="48" y="448">Package appearance</text>
    <text x="420" y="448" fill="#0a7a3e" font-weight="bold">GO</text>
    <text x="48" y="478">Seal integrity</text>
    <text x="420" y="478" fill="#0a7a3e" font-weight="bold">GO</text>
    <text x="48" y="508">Case count</text>
    <text x="420" y="508" fill="#0a7a3e" font-weight="bold">GO</text>
  </g>
  <text x="360" y="560" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">Filename contains "go" → demo classifier returns Go</text>
</svg>
